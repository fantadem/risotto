<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Risotto</title>

    <!-- Bootstrap 5.3 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

    <!-- Header -->
    <header class="container py-5">
        <div class="row align-items-center">

            <!-- Texte -->
            <div class="col-lg-6">
                <h1 class="display-4 fw-bold">Risotto</h1>

                <p class="lead">
                    Une délicieuse recette de risotto crémeux.
                </p>

                <!-- Badge Nutri-Score -->
                <div id="nutriscore-recette" class="mt-3"></div>
            </div>

            <!-- Image -->
            <div class="col-lg-6 text-center">
                <img 
                    src="https://images.unsplash.com/photo-1476124369491-e7addf5db371?q=80&w=1200&auto=format&fit=crop"
                    alt="Risotto"
                    class="img-fluid rounded shadow"
                >
            </div>

        </div>
    </header>

    <!-- Ingrédients -->
    <section class="container py-4">
        <h2 class="mb-4">Ingrédients</h2>

        <div id="productList" class="row g-4">
            <!-- Contenu dynamique -->
        </div>
    </section>

    <!-- Étapes -->
    <section class="container py-4">
        <h2 class="mb-4">Étapes de préparation</h2>

        <div id="etapesList" class="row g-3">
            <!-- Contenu dynamique -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="container py-5 text-center text-muted">
        <p>Projet IF08 - Recette Risotto</p>
    </footer>

    <!-- Scripts -->
    <script src="js/ingredients.js"></script>
    <script src="js/nutriscore.js"></script>
    <script src="js/etapes.js"></script>

</body>
</html>
